# Server
server.port=8080
server.servlet.context-path=/api

# ─── DATABASE ───────────────────────────────────────────────
# Use environment variables for credentials (Streamlit Cloud / Railway / Render)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/smart_campus_ems?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:your_mysql_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ─── JWT ─────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:SmartCampusEMSSecretKey2025VeryLongSecretKeyForJWTTokenGeneration}
app.jwt.expiration=86400000

# ─── MAIL (Gmail SMTP) ───────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=${MAIL_FROM:Smart Campus EMS <your_email@gmail.com>}

# ─── FILE UPLOAD ─────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# ─── LOGGING ─────────────────────────────────────────────────
logging.level.com.campus=DEBUG
logging.level.org.springframework.security=INFO

# ─── CORS (add Streamlit Cloud URL here) ─────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500,http://localhost:8501}

# ─── OTP ─────────────────────────────────────────────────────
app.otp.expiry-minutes=10
