<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcements - Smart Campus EMS</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<nav class="navbar" id="navbar">
    <div class="nav-container">
        <div class="nav-brand"><a href="../index.html"><i class="fas fa-graduation-cap"></i> Smart Campus EMS</a></div>
        <ul class="nav-links" id="navLinks">
            <li><a href="../index.html">Home</a></li><li><a href="events.html">Events</a></li>
            <li><a href="venues.html">Venues</a></li><li><a href="announcements.html" class="active">Announcements</a></li>
        </ul>
        <div class="nav-actions">
            <div id="authButtons"><a href="login.html" class="btn btn-outline">Login</a><a href="register.html" class="btn btn-primary">Register</a></div>
            <div id="userMenu" class="user-menu hidden"><div class="user-avatar" id="userAvatar"></div><div class="dropdown-menu"><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a><hr><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></div></div>
            <div class="notification-bell hidden" id="notifBell" onclick="toggleNotifications()"><i class="fas fa-bell"></i><span class="notif-badge" id="notifCount">0</span></div>
        </div>
    </div>
</nav>
<div style="padding-top:65px">
    <div style="background:linear-gradient(135deg,var(--primary),var(--secondary));padding:50px 20px;text-align:center;color:white">
        <h1 style="font-size:42px;font-weight:800;margin-bottom:10px">Announcements</h1>
        <p style="opacity:0.9;font-size:18px">Stay updated with the latest campus news</p>
    </div>
    <div class="container" style="padding:40px 20px 60px;max-width:800px">
        <div id="announcementsContainer"><div class="loading-spinner"><div class="spinner"></div></div></div>
    </div>
</div>
<div class="notif-panel hidden" id="notifPanel"><div class="notif-header"><h4>Notifications</h4><button onclick="toggleNotifications()"><i class="fas fa-times"></i></button></div><div class="notif-list" id="notifList"></div></div>
<script src="../js/api.js"></script><script src="../js/auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
    try {
        const user = getUser();
        const announcements = await API.getAnnouncements(user?.role);
        const el = document.getElementById('announcementsContainer');
        if (!announcements || announcements.length===0) { el.innerHTML='<p class="empty-state">No announcements found</p>'; return; }
        el.innerHTML = announcements.map(a=>`
            <div class="card" style="margin-bottom:16px;border-left:4px solid ${a.pinned||a.isPinned?'var(--primary)':'var(--gray-300)'}">
                <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">
                    <div style="display:flex;align-items:center;gap:10px">
                        ${a.pinned||a.isPinned?'<span style="color:var(--primary)"><i class="fas fa-thumbtack"></i> Pinned</span>':''}
                        <span class="badge badge-primary">${a.targetRole||'ALL'}</span>
                    </div>
                    <span style="font-size:12px;color:var(--gray-500)">${formatDate(a.createdAt)}</span>
                </div>
                <h3 style="font-size:18px;margin-bottom:8px">${a.title}</h3>
                <p style="color:var(--gray-700);line-height:1.8">${a.content}</p>
                <p style="margin-top:10px;font-size:13px;color:var(--gray-500)"><i class="fas fa-user"></i> ${a.author?.name||'Admin'}</p>
            </div>`).join('');
    } catch(e) { document.getElementById('announcementsContainer').innerHTML='<p style="color:var(--danger)">Could not load announcements.</p>'; }
});
</script>
</body>
</html>
