<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Events - Smart Campus EMS</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="dashboard">
    <aside class="sidebar">
        <div class="sidebar-logo"><i class="fas fa-graduation-cap"></i> Campus EMS</div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
            <li><a href="events.html"><i class="fas fa-calendar-alt"></i> Events</a></li>
            <li><a href="my-events.html" class="active"><i class="fas fa-calendar-check"></i> My Events</a></li>
            <li><a href="announcements.html"><i class="fas fa-bullhorn"></i> Announcements</a></li>
            <li><a href="venues.html"><i class="fas fa-map-marker-alt"></i> Venues</a></li>
            <li><a href="profile.html"><i class="fas fa-user"></i> Profile</a></li>
            <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </aside>
    <main class="main-content">
        <div class="page-header">
            <h1>My Events</h1>
            <a href="events.html" class="btn btn-primary"><i class="fas fa-search"></i> Find Events</a>
        </div>
        <!-- Tabs -->
        <div style="display:flex;gap:8px;margin-bottom:24px;border-bottom:2px solid var(--gray-300);padding-bottom:-2px">
            <button class="tab-btn active" onclick="switchTab('registered')" id="tab-registered" style="padding:10px 20px;border:none;background:none;font-weight:600;color:var(--primary);border-bottom:3px solid var(--primary);cursor:pointer">Registered Events</button>
            <button class="tab-btn" onclick="switchTab('organized')" id="tab-organized" style="padding:10px 20px;border:none;background:none;font-weight:600;color:var(--gray-500);border-bottom:3px solid transparent;cursor:pointer">Organized Events</button>
        </div>

        <div id="tab-registered-content">
            <div id="registeredList"><div class="loading-spinner"><div class="spinner"></div></div></div>
        </div>
        <div id="tab-organized-content" style="display:none">
            <div id="organizedList"><div class="loading-spinner"><div class="spinner"></div></div></div>
        </div>
    </main>
</div>

<!-- QR Modal -->
<div id="qrModal" class="modal-overlay hidden">
    <div class="modal" style="text-align:center;max-width:380px">
        <button class="modal-close" onclick="document.getElementById('qrModal').classList.add('hidden')" style="position:absolute;top:16px;right:16px"><i class="fas fa-times"></i></button>
        <div class="ticket-card"><div class="ticket-number">EVENT TICKET</div><div class="ticket-event" id="qrEventName">-</div><div id="qrTicketNum" style="font-size:11px;opacity:0.8"></div></div>
        <img id="qrImg" src="" style="width:200px;height:200px;border:4px solid var(--gray-300);border-radius:10px;margin:16px 0">
        <p style="font-size:13px;color:var(--gray-500)">Show this QR code at the event entrance</p>
    </div>
</div>

<script src="../js/api.js"></script><script src="../js/auth.js"></script>
<script>
let activeTab = 'registered';
document.addEventListener('DOMContentLoaded', async () => {
    if (!isLoggedIn()) { window.location.href='login.html'; return; }
    loadRegistered(); loadOrganized();
});

async function loadRegistered() {
    const el = document.getElementById('registeredList');
    try {
        const regs = await API.getMyEvents();
        if (!regs || regs.length===0) { el.innerHTML='<div class="empty-state"><i class="fas fa-calendar-times" style="font-size:48px;margin-bottom:16px;display:block"></i><p>No registrations yet</p><a href="events.html" class="btn btn-primary" style="margin-top:10px">Browse Events</a></div>'; return; }
        el.innerHTML = `<div class="table-container"><table>
            <thead><tr><th>Event</th><th>Date</th><th>Status</th><th>Ticket</th><th>Actions</th></tr></thead>
            <tbody>${regs.map(r=>`<tr>
                <td><strong>${r.event?.title||'N/A'}</strong><br><small style="color:var(--gray-500)">${r.event?.category||''}</small></td>
                <td>${formatDate(r.event?.startDate)}</td>
                <td><span class="badge ${r.registrationStatus==='CONFIRMED'?'badge-success':'badge-gray'}">${r.registrationStatus}</span></td>
                <td style="font-size:12px;font-family:monospace">${r.ticketNumber||'-'}</td>
                <td style="display:flex;gap:6px">
                    <button class="btn btn-primary btn-sm" onclick="viewQr('${r.ticketNumber||''}','${(r.event?.title||'').replace(/'/g,"\\'")}','${r.qrCode||''}')"><i class="fas fa-qrcode"></i></button>
                    <a href="event-detail.html?id=${r.event?.id}" class="btn btn-outline btn-sm"><i class="fas fa-eye"></i></a>
                </td>
            </tr>`).join('')}</tbody>
        </table></div>`;
    } catch(e) { el.innerHTML='<p style="color:var(--danger)">Error loading events</p>'; }
}

async function loadOrganized() {
    const el = document.getElementById('organizedList');
    try {
        const events = await API.getMyOrganizedEvents();
        if (!events || events.length===0) { el.innerHTML='<div class="empty-state"><i class="fas fa-calendar-plus" style="font-size:48px;margin-bottom:16px;display:block"></i><p>No events organized yet</p></div>'; return; }
        el.innerHTML = `<div class="table-container"><table>
            <thead><tr><th>Event</th><th>Date</th><th>Status</th><th>Registrations</th><th>Actions</th></tr></thead>
            <tbody>${events.map(e=>`<tr>
                <td><strong>${e.title}</strong><br><small style="color:var(--gray-500)">${e.category}</small></td>
                <td>${formatDate(e.startDate)}</td>
                <td><span class="badge ${e.status==='PUBLISHED'?'badge-success':e.status==='COMPLETED'?'badge-primary':'badge-gray'}">${e.status}</span></td>
                <td>${e.currentAttendees||0}${e.maxAttendees?'/'+e.maxAttendees:''}</td>
                <td><a href="event-detail.html?id=${e.id}" class="btn btn-outline btn-sm"><i class="fas fa-eye"></i> View</a></td>
            </tr>`).join('')}</tbody>
        </table></div>`;
    } catch(e) { el.innerHTML='<p style="color:var(--danger)">Error loading organized events</p>'; }
}

function switchTab(tab) {
    activeTab = tab;
    document.getElementById('tab-registered-content').style.display = tab==='registered'?'block':'none';
    document.getElementById('tab-organized-content').style.display = tab==='organized'?'block':'none';
    ['registered','organized'].forEach(t => {
        const btn = document.getElementById('tab-'+t);
        btn.style.color = t===tab?'var(--primary)':'var(--gray-500)';
        btn.style.borderBottom = t===tab?'3px solid var(--primary)':'3px solid transparent';
    });
}

function viewQr(ticket, eventName, qrCode) {
    document.getElementById('qrEventName').textContent = eventName;
    document.getElementById('qrTicketNum').textContent = ticket;
    const img = document.getElementById('qrImg');
    img.src = qrCode || '';
    img.style.display = qrCode ? 'block' : 'none';
    document.getElementById('qrModal').classList.remove('hidden');
}
</script>
</body>
</html>
