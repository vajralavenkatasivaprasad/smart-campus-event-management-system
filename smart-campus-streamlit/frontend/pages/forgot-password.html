<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Smart Campus EMS</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-left">
        <a href="../index.html" style="color:rgba(255,255,255,0.8);display:flex;align-items:center;gap:8px;font-size:20px;font-weight:700;margin-bottom:40px"><i class="fas fa-graduation-cap"></i> Smart Campus EMS</a>
        <h2>Reset Your Password 🔐</h2>
        <p style="opacity:0.85;line-height:1.8">Don't worry, it happens! We'll send a secure OTP to your registered email to reset your password.</p>
    </div>
    <div class="auth-right">
        <!-- Step 1: Email -->
        <div class="auth-form" id="step1">
            <h2>Forgot Password</h2>
            <p>Enter your email to receive a reset OTP</p>
            <div id="alertContainer"></div>
            <div class="form-group"><label>Email Address</label>
                <div class="input-with-icon"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="you@campus.edu"></div>
            </div>
            <button class="btn btn-primary btn-full" onclick="sendResetOtp()" id="sendBtn"><i class="fas fa-paper-plane"></i> Send OTP</button>
            <div class="auth-link"><a href="login.html">← Back to Login</a></div>
        </div>
        <!-- Step 2: OTP + New Password -->
        <div class="auth-form hidden" id="step2">
            <h2>Reset Password</h2>
            <p>Enter the OTP sent to your email and your new password</p>
            <div id="alertContainer2"></div>
            <div class="form-group"><label>OTP</label>
                <div class="otp-inputs">
                    <input type="text" maxlength="1" oninput="moveNext(this,1)" onkeydown="movePrev(event,0)">
                    <input type="text" maxlength="1" oninput="moveNext(this,2)" onkeydown="movePrev(event,1)">
                    <input type="text" maxlength="1" oninput="moveNext(this,3)" onkeydown="movePrev(event,2)">
                    <input type="text" maxlength="1" oninput="moveNext(this,4)" onkeydown="movePrev(event,3)">
                    <input type="text" maxlength="1" oninput="moveNext(this,5)" onkeydown="movePrev(event,4)">
                    <input type="text" maxlength="1" onkeydown="movePrev(event,5)">
                </div>
            </div>
            <div class="form-group"><label>New Password</label>
                <div class="input-with-icon"><i class="fas fa-lock"></i><input type="password" id="newPassword" placeholder="Min. 6 characters"></div>
            </div>
            <div class="form-group"><label>Confirm Password</label>
                <div class="input-with-icon"><i class="fas fa-lock"></i><input type="password" id="confirmPassword" placeholder="Repeat new password"></div>
            </div>
            <button class="btn btn-primary btn-full" onclick="resetPassword()"><i class="fas fa-key"></i> Reset Password</button>
        </div>
    </div>
</div>
<script src="../js/api.js"></script>
<script>
let resetEmail = '';
async function sendResetOtp() {
    const email = document.getElementById('email').value.trim();
    if (!email) { showAlert('Please enter your email', 'error'); return; }
    const btn = document.getElementById('sendBtn');
    btn.disabled = true; btn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2px"></div> Sending...';
    const res = await API.forgotPassword({ email });
    showAlert(res.message || 'OTP sent!', 'success');
    resetEmail = email;
    setTimeout(() => { document.getElementById('step1').classList.add('hidden'); document.getElementById('step2').classList.remove('hidden'); }, 1000);
}
async function resetPassword() {
    const inputs = document.querySelectorAll('.otp-inputs input');
    const otp = Array.from(inputs).map(i=>i.value).join('');
    const newPassword = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmPassword').value;
    if (otp.length!==6) { showAlert('Enter 6-digit OTP','error','alertContainer2'); return; }
    if (newPassword !== confirm) { showAlert('Passwords do not match','error','alertContainer2'); return; }
    const res = await API.resetPassword({ email: resetEmail, otp, newPassword });
    if (res.message?.includes('success')) {
        showAlert('Password reset! Redirecting...','success','alertContainer2');
        setTimeout(() => window.location.href='login.html', 1500);
    } else showAlert(res.message||'Error','error','alertContainer2');
}
function moveNext(el,next) { if(el.value.length===1){const i=document.querySelectorAll('.otp-inputs input');if(next<i.length)i[next].focus();} }
function movePrev(e,prev) { if(e.key==='Backspace'){const i=document.querySelectorAll('.otp-inputs input');if(!i[prev+1]?.value&&prev>=0)i[prev].focus();} }
</script>
</body>
</html>
